spring.application.name=systeme-reservation-jo
spring.datasource.url=jdbc:postgresql://localhost:5432/systeme_reservation_jo
spring.datasource.username=postgres
# anthony
spring.datasource.password=changeme
# OK pour le developpement
spring.jpa.hibernate.ddl-auto=update
# Affiche les requetes SQL
spring.jpa.show-sql=true
# Formate le SQL
spring.jpa.properties.hibernate.format_sql=true
# Change ca!
app.jwtSecret=UneCleSecreteVraimentTresLongueEtComplexe
# 24 heures
app.jwtExpirationInMs=86400000
logging.level.org.springframework.security=DEBUG